name: Build JAR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify JAR exists
        run: |
          echo "=== target/ directory ==="
          ls -lh target/
          if [ -f target/bi-dashboard.jar ]; then
            echo ""
            echo "OK: target/bi-dashboard.jar found."
          else
            echo ""
            echo "ERROR: target/bi-dashboard.jar not found!"
            exit 1
          fi

      - name: Start JAR
        run: |
          nohup java -jar target/bi-dashboard.jar > app.log 2>&1 &
          echo "JAR started in background (PID $!)."

      - name: Wait for Spring Boot
        run: |
          echo "Waiting 15 seconds for Spring Boot startup..."
          sleep 15

      - name: Show application log
        run: |
          echo "=== app.log ==="
          cat app.log

      - name: Health check — index page
        run: |
          echo "Checking GET / ..."
          curl -f http://localhost:8080
          echo ""
          echo "OK: GET / returned 200."

      - name: Health check — dashboard-data.json
        run: |
          echo "Checking GET /data/dashboard-data.json ..."
          curl -f http://localhost:8080/data/dashboard-data.json > /dev/null
          echo "OK: GET /data/dashboard-data.json returned 200."

      - name: Health check — analysis-debug.json
        run: |
          echo "Checking GET /data/analysis-debug.json ..."
          curl -f http://localhost:8080/data/analysis-debug.json > /dev/null
          echo "OK: GET /data/analysis-debug.json returned 200."

      - name: Check page title
        run: |
          echo "Checking page title..."
          curl -s http://localhost:8080 | grep "某家电企业库存成本构成异常分析"
          echo "OK: Page title found."

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bi-dashboard-jar
          path: target/bi-dashboard.jar
          if-no-files-found: error
