name: Build JAR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify JAR exists
        run: |
          echo "=== target/ contents ==="
          ls -lh target/
          echo ""
          if [ -f target/bi-dashboard.jar ]; then
            echo "bi-dashboard.jar found."
          else
            echo "ERROR: bi-dashboard.jar not found!"
            exit 1
          fi

      - name: Start JAR
        run: |
          java -jar target/bi-dashboard.jar &
          echo "JAR starting in background..."

      - name: Wait for startup
        run: |
          echo "Waiting 15 seconds for Spring Boot startup..."
          sleep 15

      - name: Health check — index page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: GET / returned $STATUS"
            exit 1
          fi
          echo "OK: GET / returned $STATUS"

      - name: Health check — dashboard-data.json
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/data/dashboard-data.json)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: GET /data/dashboard-data.json returned $STATUS"
            exit 1
          fi
          echo "OK: GET /data/dashboard-data.json returned $STATUS"

      - name: Health check — analysis-debug.json
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/data/analysis-debug.json)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: GET /data/analysis-debug.json returned $STATUS"
            exit 1
          fi
          echo "OK: GET /data/analysis-debug.json returned $STATUS"

      - name: Verify JSON content
        run: |
          curl -s http://localhost:8080/data/dashboard-data.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          k = d['kpi']
          print(f'KPI: total={k[\"总库存成本_万元\"]}w  raw={k[\"原材料成本_万元\"]}w  ratio={k[\"原材料成本占比\"]}%')
          print(f'Abnormal BU: {k[\"异常业务单元\"]}  Abnormal PL: {k[\"异常产品线\"]}')
          assert len(d['库存成本结构']) == 21, 'cost structure wrong'
          assert len(d['物料分析']['高风险物料TOP10']) == 10, 'material TOP10 wrong'
          print('JSON content verified.')
          "

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Take screenshot
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1920, height: 1080 } });
            await page.goto('http://localhost:8080', { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForTimeout(3000);  // let ECharts render
            await page.screenshot({ path: 'dashboard-screenshot.png', fullPage: true });
            console.log('Screenshot saved.');
            await browser.close();
          })();
          "

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bi-dashboard-jar
          path: target/bi-dashboard.jar
          if-no-files-found: error

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshot
          path: dashboard-screenshot.png
          if-no-files-found: error
